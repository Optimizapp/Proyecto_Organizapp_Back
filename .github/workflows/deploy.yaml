name: Build and Deploy Organizapp

on:
  push:
    branches: [ Dev ] # Se dispara al subir cambios a dev

jobs:
  build-and-publish:
    name: Build, Test and Push Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17 # Asegura que el entorno tenga Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run Unit Tests # CALIDAD: Si esto falla, el deploy se detiene
      run: chmod +x mvnw && ./mvnw clean test

    - name: Set OWNER_LC (Lower Case GitHub Username)
      run: |
        echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        # Reemplaza 'proyecto-organizapp-back' con el nombre real de tu repo si prefieres
        tags: |
          ghcr.io/${{ env.OWNER_LC }}/Proyecto_Organizapp_Back:latest
